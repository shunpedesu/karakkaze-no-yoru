<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>からっかぜの夜</title>

  <!-- OGP / SNSサムネイル -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://shunpedesu.github.io/karakkaze-no-yoru/">
  <meta property="og:title"       content="からっかぜの夜">
  <meta property="og:description" content="12月の四万温泉、孤立した旅館で起きた連続死。あなたは真実にたどり着けるか。サウンドノベル">
  <meta property="og:image"       content="https://images.unsplash.com/photo-1645582115238-f52fe36a2b04?auto=format&fit=crop&w=1200&h=630&q=80">
  <meta property="og:locale"      content="ja_JP">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="からっかぜの夜">
  <meta name="twitter:description" content="12月の四万温泉、孤立した旅館で起きた連続死。あなたは真実にたどり着けるか。サウンドノベル">
  <meta name="twitter:image"       content="https://images.unsplash.com/photo-1645582115238-f52fe36a2b04?auto=format&fit=crop&w=1200&h=630&q=80">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="background"></div>
  <div id="darkness-overlay"></div>
  <div id="memory-overlay"></div>
  <div id="deduction-overlay">
    <div id="deduction-card">
      <div id="deduction-label">——気づいたこと</div>
      <div id="deduction-text"></div>
      <div id="deduction-hint">タップして続ける</div>
    </div>
  </div>

  <div id="silhouette-area">
    <img id="silhouette-img" src="" alt="">
  </div>

  <div id="title-card">
    <div id="title-card-inner"></div>
  </div>

  <div id="controls">
    <button id="backlog-btn" title="バックログ">📜</button>
    <button id="hide-btn" title="テキスト非表示">👁</button>
    <button id="save-btn" title="セーブ">💾</button>
    <button id="load-btn" title="ロード">📂</button>
    <button id="settings-btn" title="設定">⚙</button>
  </div>

  <div id="menu-modal">
    <div id="menu-inner">
      <div id="menu-tabs">
        <button class="menu-tab active" data-tab="settings">設　定</button>
        <button class="menu-tab" data-tab="map">見取り図</button>
        <button class="menu-tab" data-tab="gallery">エンド記録</button>
        <button id="menu-close">×</button>
      </div>

      <div class="tab-pane active" id="pane-settings">
        <div class="settings-row">
          <span class="settings-label">テキスト速度</span>
          <div class="speed-btns">
            <button class="speed-btn" data-speed="70">遅</button>
            <button class="speed-btn active" data-speed="38">普</button>
            <button class="speed-btn" data-speed="10">速</button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">オートプレイ</span>
          <button id="auto-btn" class="toggle-btn">OFF</button>
        </div>
        <div class="settings-row">
          <span class="settings-label">音　　量</span>
          <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
        </div>
      </div>

      <div class="tab-pane" id="pane-map">
        <svg id="inn-map-svg" viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg">
          <text x="250" y="22" text-anchor="middle" font-size="11" fill="rgba(170,160,128,0.48)" letter-spacing="6">四 万 館 見 取 り 図</text>

          <!-- 食堂（左）・ロビー（中）・事務室（右）-->
          <rect x="18" y="34" width="148" height="58" stroke="rgba(135,125,103,0.3)" stroke-width="1" fill="none"/>
          <text x="92" y="58" text-anchor="middle" font-size="10" fill="rgba(158,148,118,0.6)">食　堂</text>
          <text x="92" y="74" text-anchor="middle" font-size="8" fill="rgba(125,115,90,0.35)">アリバイ確認の場所</text>

          <rect x="166" y="34" width="166" height="58" stroke="rgba(135,125,103,0.3)" stroke-width="1" fill="none"/>
          <text x="249" y="58" text-anchor="middle" font-size="10" fill="rgba(158,148,118,0.6)">ロビー</text>
          <text x="249" y="74" text-anchor="middle" font-size="8" fill="rgba(135,125,100,0.35)">フロント</text>

          <rect id="map-rect-sibukawa" x="332" y="34" width="150" height="58" stroke="rgba(135,125,103,0.3)" stroke-width="1" fill="none"/>
          <text x="407" y="55" text-anchor="middle" font-size="10" fill="rgba(158,148,118,0.58)">事　務　室</text>
          <text id="map-mark-sibukawa" x="407" y="71" text-anchor="middle" font-size="9" fill="rgba(195,85,75,0.68)" display="none">× 渋川支配人</text>

          <!-- 廊下 -->
          <rect x="18" y="92" width="464" height="36" stroke="rgba(128,118,98,0.22)" stroke-width="1" fill="rgba(26,24,30,0.3)"/>
          <text x="110" y="106" text-anchor="middle" font-size="9" fill="rgba(142,132,108,0.45)" letter-spacing="3">廊　下</text>
          <text id="map-mark-kyabeza" x="310" y="120" text-anchor="middle" font-size="9" fill="rgba(195,85,75,0.62)" display="none">× 長野原キャベ蔵が倒れた場所</text>

          <!-- 客室 101〜103 + 従業員控え室 -->
          <rect x="18" y="128" width="88" height="78" stroke="rgba(118,108,88,0.22)" stroke-width="1" fill="none"/>
          <text x="62" y="155" text-anchor="middle" font-size="8" fill="rgba(128,118,95,0.36)">101</text>
          <text x="62" y="171" text-anchor="middle" font-size="9" fill="rgba(150,140,112,0.6)">中之条</text>

          <rect x="106" y="128" width="88" height="78" stroke="rgba(118,108,88,0.22)" stroke-width="1" fill="none"/>
          <text x="150" y="155" text-anchor="middle" font-size="8" fill="rgba(128,118,95,0.36)">102</text>
          <text x="150" y="171" text-anchor="middle" font-size="9" fill="rgba(150,140,112,0.6)">原　町</text>

          <rect x="194" y="128" width="88" height="78" stroke="rgba(118,108,88,0.22)" stroke-width="1" fill="none"/>
          <text x="238" y="155" text-anchor="middle" font-size="8" fill="rgba(128,118,95,0.36)">103</text>
          <text x="238" y="171" text-anchor="middle" font-size="9" fill="rgba(150,140,112,0.6)">太　田</text>

          <rect x="282" y="128" width="50" height="78" stroke="rgba(108,98,78,0.18)" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
          <text x="307" y="160" text-anchor="middle" font-size="8" fill="rgba(118,108,85,0.28)">従業員</text>
          <text x="307" y="174" text-anchor="middle" font-size="8" fill="rgba(118,108,85,0.28)">控え室</text>

          <!-- 長野原夫妻（事務室の真向かい） -->
          <rect id="map-rect-naganohara" x="332" y="128" width="150" height="78" stroke="rgba(135,125,103,0.3)" stroke-width="1" fill="none"/>
          <text x="407" y="152" text-anchor="middle" font-size="8" fill="rgba(128,118,95,0.36)">104</text>
          <text x="407" y="168" text-anchor="middle" font-size="9" fill="rgba(150,140,112,0.58)">長野原夫妻</text>
          <text id="map-mark-butako" x="407" y="185" text-anchor="middle" font-size="9" fill="rgba(195,85,75,0.65)" display="none">× 豚子</text>

          <!-- 風呂 -->
          <rect x="18" y="220" width="238" height="78" stroke="rgba(62,100,148,0.28)" stroke-width="1" fill="rgba(16,28,46,0.18)" rx="4"/>
          <text x="137" y="247" text-anchor="middle" font-size="10" fill="rgba(138,150,170,0.55)">露　天　風　呂</text>
          <text id="map-mark-nakano" x="137" y="264" text-anchor="middle" font-size="9" fill="rgba(195,85,75,0.65)" display="none">× 中之条まんじ</text>
          <text id="map-mark-nakano-sub" x="137" y="280" text-anchor="middle" font-size="8" fill="rgba(118,108,85,0.3)" display="none">第一の事件現場</text>

          <rect x="266" y="220" width="216" height="78" stroke="rgba(62,100,148,0.18)" stroke-width="1" fill="rgba(14,22,38,0.1)" rx="4"/>
          <text x="374" y="262" text-anchor="middle" font-size="10" fill="rgba(128,140,160,0.38)">大浴場（内風呂）</text>

          <text x="18" y="326" font-size="9" fill="rgba(195,85,75,0.5)">×　事件現場</text>
          <text x="115" y="326" font-size="9" fill="rgba(108,98,78,0.32)">− −　非公開エリア</text>
        </svg>
      </div>

      <div class="tab-pane" id="pane-gallery">
        <div id="gallery-grid"></div>
      </div>
    </div>
  </div>

  <div id="backlog-overlay">
    <div id="backlog-panel">
      <div id="backlog-header">
        <span>バックログ</span>
        <button id="backlog-close">×</button>
      </div>
      <div id="backlog-content"></div>
    </div>
  </div>

  <div id="save-modal">
    <div id="save-modal-inner">
      <div id="save-modal-title">セーブ</div>
      <div id="save-slots"></div>
      <button id="save-modal-close">閉じる</button>
    </div>
  </div>

  <div id="hide-overlay"></div>

  <div id="story-header">
    <div id="story-time"></div>
    <div id="chapter-dots">
      <span class="cdot" data-ch="0" title="プロローグ"></span>
      <span class="cdot" data-ch="1" title="第1夜"></span>
      <span class="cdot" data-ch="2" title="第2夜"></span>
      <span class="cdot" data-ch="3" title="第3夜"></span>
    </div>
  </div>

  <div id="survivor-bar"></div>

  <div id="game-area">
    <div id="text-box">
      <div id="speaker-name"></div>
      <div id="text-content"></div>
      <div id="advance-indicator">▼</div>
    </div>
    <div id="choices"></div>
    <div id="input-area">
      <div id="character-list-label">この旅館にいた人たち</div>
      <div id="character-list"></div>
      <div id="input-row">
        <input type="text" id="name-input" placeholder="名前を入力" autocomplete="off" spellcheck="false">
        <button id="name-submit">決定</button>
      </div>
      <div id="input-error"></div>
    </div>
  </div>

  <button id="sound-toggle" title="音声ON/OFF">🔇</button>

  <div id="credits-overlay">
    <div id="credits-inner">
      <div id="credits-title">からっかぜの夜</div>
      <div id="credits-subtitle">Sound Novel</div>
      <div id="credits-list">
        <div class="credits-item">
          <span class="credits-role">作・制作</span>
          <span class="credits-name">しゅんぺ</span>
        </div>
        <div class="credits-item">
          <a href="https://note.com/shunpedesu" target="_blank" rel="noopener" class="credits-link">note.com/shunpedesu</a>
        </div>
      </div>
      <div id="clear-time"></div>
      <button id="credits-replay-btn">もう一度プレイする</button>
    </div>
  </div>

  <div id="start-screen">
    <div id="start-content">
      <div id="start-title">からっかぜの夜</div>
      <div id="start-subtitle">四万温泉に集いし者たち</div>
      <button id="start-btn">は じ め る</button>
    </div>
  </div>

  <script src="scenario.js"></script>
  <script src="engine.js"></script>
</body>
</html>
